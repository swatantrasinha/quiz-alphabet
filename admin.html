<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Alphabet Quiz 🎓</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-link">🏠 Homepage</a>
    <a href="quiz.html" class="nav-link">🔤 Quiz</a>
    <a href="admin.html" class="nav-link active">⚙️ Admin</a>
  </nav>

  <div class="container">
    <h1>⚙️ Admin Action</h1>

    <div class="card">
      <h2>Select Quiz Letters</h2>
      <p class="admin-desc">Tap letters to include in the quiz. Only selected letters will appear.</p>
      <div id="alpha-board" class="alpha-board"></div>
      <div class="board-actions">
        <button id="select-all-btn" class="mic-btn start-btn small-btn">Select All</button>
        <button id="clear-btn" class="mic-btn clear-btn small-btn">Clear All</button>
      </div>
      <div id="admin-feedback" class="admin-feedback"></div>
    </div>

    <div class="card">
      <h2>Current Setting</h2>
      <p id="current-setting" class="current-setting"></p>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
